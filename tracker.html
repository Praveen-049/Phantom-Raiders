<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Phantom Tracker | Rider Login</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --primary: #3b82f6;
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
            --bg: #0b1220;
            --glass: rgba(22, 32, 51, 0.82);
            --glass-border: rgba(255, 255, 255, 0.12);
        }

        body { 
            margin: 0; 
            font-family: 'Outfit', sans-serif; 
            background: var(--bg); 
            color: white; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
        }

        .container {
            width: 85%;
            max-width: 400px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 40px 25px;
            border-radius: 35px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
            gap: 25px;
            transition: all 0.5s ease;
        }

        /* Views */
        #login-view { display: flex; flex-direction: column; gap: 20px; }
        #ride-view { display: none; flex-direction: column; gap: 20px; }

        .brand {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: 3px;
            background: linear-gradient(135deg, #fff 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        input {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            padding: 15px;
            border-radius: 15px;
            color: white;
            font-family: inherit;
            font-size: 1rem;
            text-align: center;
            outline: none;
            transition: border-color 0.3s;
        }
        input:focus { border-color: var(--primary); }

        .btn {
            padding: 15px;
            border-radius: 15px;
            border: none;
            font-family: inherit;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:active { transform: scale(0.98); }
        .btn-park { background: var(--warning); color: #000; margin-top: 10px; }

        /* Start Ride Button */
        #start-ride-btn {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: var(--primary);
            border: 6px solid rgba(59, 130, 246, 0.2);
            color: white;
            font-weight: 800;
            margin: 10px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            box-shadow: 0 0 40px rgba(59, 130, 246, 0.3);
            cursor: pointer;
            transition: 0.3s;
        }
        #start-ride-btn.riding {
            background: var(--danger);
            box-shadow: 0 0 40px rgba(239, 68, 68, 0.3);
            border-color: rgba(239, 68, 68, 0.2);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .stat-box {
            background: rgba(255,255,255,0.03);
            padding: 12px;
            border-radius: 15px;
            border: 1px solid var(--glass-border);
        }
        .label { font-size: 0.65rem; color: #94a3b8; text-transform: uppercase; margin-bottom: 4px; }
        .value { font-size: 1.2rem; font-weight: 700; }

        @keyframes pulse-warning {
            0% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(245, 158, 11, 0); }
            100% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0); }
        }

        #crash-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--danger); z-index: 5000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            transition: 0.3s;
        }

        #log-panel {
            position: fixed; bottom: 15px; font-size: 0.6rem; color: #475569;
        }
    </style>
</head>
<body>

<div id="crash-overlay">
    <i class="fas fa-triangle-exclamation fa-4x"></i>
    <h1 style="font-size: 2.5rem; margin: 15px 0;">CRASH DETECTED</h1>
    <div id="countdown" style="font-size: 5rem; font-weight: 800;">10</div>
    <div style="display: flex; gap: 15px; margin-top: 30px;">
        <button class="btn" style="background:white; color:var(--danger);" onclick="cancelCrashAlert()">I'M OK</button>
        <a href="tel:112" style="text-decoration:none;"><button class="btn" style="background:#000; color:white;"><i class="fas fa-phone"></i> SOS</button></a>
    </div>
</div>

<div class="container">
    <!-- LOGIN VIEW -->
    <div id="login-view">
        <div class="brand">PHANTOM</div>
        <p style="color:#94a3b8; margin:0;">Enter Rider Profile</p>
        <input type="text" id="rider-name" placeholder="Rider Name" value="Raider 1">
        <button class="btn btn-primary" onclick="doLogin()">PROCEED <i class="fas fa-arrow-right"></i></button>
    </div>

    <!-- RIDE VIEW -->
    <div id="ride-view">
        <div class="header">
            <div id="display-rider" style="font-weight:600; font-size:1.1rem; color:var(--primary);">---</div>
            <div style="font-size: 0.7rem; color: #94a3b8; margin-top: 2px;">Premium Ride Mode</div>
        </div>

        <div id="start-ride-btn" onclick="toggleRide()">
            <i class="fas fa-play fa-2x" id="play-icon"></i>
            <span id="btn-text" style="font-size:0.8rem; margin-top:10px;">START RIDE</span>
        </div>

        <div id="live-stats" style="display:none;">
            <div class="stats-grid">
                <div class="stat-box">
                    <div class="label">Speed</div>
                    <div id="speed" class="value">0</div>
                    <div style="font-size: 0.6rem; color: #64748b;">km/h</div>
                </div>
                <div class="stat-box">
                    <div class="label">Accuracy</div>
                    <div id="accuracy" class="value">--</div>
                    <div style="font-size: 0.6rem; color: #64748b;">m</div>
                </div>
                <div class="stat-box" style="grid-column: span 2;">
                    <div class="label">Location</div>
                    <div id="address" class="value" style="font-size: 0.8rem; font-weight: 400; color: var(--primary);">---</div>
                </div>
            </div>
            
            <div id="park-options" style="display: flex; flex-direction: column; gap: 10px; margin-top: 15px;">
                <button class="btn" style="background: var(--glass-border); color: white;" onclick="parkAndLock()">
                    <i class="fas fa-lock"></i> PARK & LOCK
                </button>
                <button class="btn btn-park" onclick="parkLockNotify()">
                    <i class="fab fa-whatsapp"></i> PARK, LOCK & NOTIFY
                </button>
            </div>
        </div>

        <div id="parked-view" style="display:none; flex-direction:column; gap:20px; align-items:center; margin-top:10px;">
            <div style="width:100px; height:100px; border-radius:50%; background:rgba(245,158,11,0.1); border:4px solid var(--warning); display:flex; align-items:center; justify-content:center; color:var(--warning); animation: pulse-warning 2s infinite;">
                <i class="fas fa-parking fa-3x"></i>
            </div>
            <div style="font-weight:700; color:var(--warning);">BIKE IS PARKED & ARMED</div>
            <button class="btn" style="background:var(--success); color:white; width:100%; border-radius:20px; padding:20px;" onclick="unlockBike()">
                <i class="fas fa-unlock"></i> UNLOCK BIKE
            </button>
        </div>

        <div style="display:flex; gap:8px; justify-content:center; margin-top:10px;">
            <div id="gps-badge" style="background:rgba(59,130,246,0.1); color:#3b82f6; padding:4px 10px; border-radius:20px; font-size:0.6rem; font-weight:700;">GPS SEARCHING</div>
            <div id="lock-badge" style="background:rgba(249,115,22,0.1); color:#f97316; padding:4px 10px; border-radius:20px; font-size:0.6rem; font-weight:700; display:none;">LOCKED</div>
        </div>
    </div>
</div>

<div id="log-panel">System Standby</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCx75fIPlI9Ezn9S6l8vZnsi1qDlP6nuoo",
        authDomain: "phantom-raiders.firebaseapp.com",
        databaseURL: "https://phantom-raiders-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "phantom-raiders",
        storageBucket: "phantom-raiders.firebasestorage.app",
        messagingSenderId: "1055222458613",
        appId: "1:1055222458613:web:75d48960bbb72a3ff7bdbc",
        measurementId: "G-3GX5D8RDMW"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // --- State ---
    let riderName = "";
    let isRiding = false;
    let isLocked = false;
    let isTheftAlert = false;
    let lastLockTime = 0;
    let watchId = null;
    let audioCtx = null;
    let alarmInterval = null;
    let crashTimer = null;
    let currentCoords = null;
    let currentAddress = "---";

    // --- Login ---
    window.doLogin = () => {
        riderName = document.getElementById("rider-name").value.trim() || "Raider";
        document.getElementById("display-rider").innerText = "Rider: " + riderName;
        document.getElementById("login-view").style.display = "none";
        document.getElementById("ride-view").style.display = "flex";
        set(ref(db, "bike/rider"), riderName);
        set(ref(db, "bike/isParked"), false);
        log("Logged in as " + riderName);
    };

    // --- Ride Control ---
    window.toggleRide = async () => {
        if (!isRiding) {
            await startRide();
        } else {
            stopRide();
        }
    };

    async function startRide() {
        try {
            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                const p = await DeviceMotionEvent.requestPermission();
                if (p !== 'granted') return alert("Permission denied.");
            }
            isRiding = true;
            updateUI(true);
            set(ref(db, "bike/isRiding"), true);
            set(ref(db, "bike/isParked"), false);
            watchId = navigator.geolocation.watchPosition(updatePosition, (e) => log(e.message), { enableHighAccuracy:true });
            window.addEventListener('devicemotion', handleMotion);
            log("Ride Started");
        } catch (e) { log(e.message); }
    }

    function stopRide() {
        isRiding = false;
        updateUI(false);
        set(ref(db, "bike/speed"), 0);
        set(ref(db, "bike/isRiding"), false);
        if (watchId) navigator.geolocation.clearWatch(watchId);
        window.removeEventListener('devicemotion', handleMotion);
        log("Ride Ended");
    }

    window.parkAndLock = () => {
        stopRide();
        set(ref(db, "bike/isParked"), true);
        set(ref(db, "bike/locked"), true);
        log("Bike Parked & Locked.");
    };

    window.parkLockNotify = () => {
        // First perform park and lock
        parkAndLock();
        
        // WhatsApp Integration
        const lat = currentCoords ? currentCoords.lat : 0;
        const lng = currentCoords ? currentCoords.lng : 0;
        const mapUrl = `https://www.google.com/maps?q=${lat},${lng}`;
        const msg = `📍 BIKE PARKED & SECURED\nRider: ${riderName}\nLocation: ${currentAddress}\nMaps: ${mapUrl}\nAnti-theft: ACTIVE 🛡️`;
        const waUrl = `https://wa.me/?text=${encodeURIComponent(msg)}`;
        
        window.open(waUrl, '_blank');
        log("Parking notification sent.");
    };

    window.unlockBike = () => {
        set(ref(db, "bike/locked"), false);
        set(ref(db, "bike/isParked"), false);
        set(ref(db, "bike/theft"), false);
        log("Bike Unlocked.");
    };

    function updateUI(riding) {
        const btn = document.getElementById("start-ride-btn");
        const icon = document.getElementById("play-icon");
        const text = document.getElementById("btn-text");
        const stats = document.getElementById("live-stats");
        const parkedView = document.getElementById("parked-view");

        if (riding) {
            btn.classList.add("riding");
            btn.style.display = "flex";
            icon.className = "fas fa-stop fa-2x";
            text.innerText = "END RIDE";
            stats.style.display = "block";
            parkedView.style.display = "none";
        } else {
            btn.classList.remove("riding");
            btn.style.display = "flex";
            icon.className = "fas fa-play fa-2x";
            text.innerText = "START RIDE";
            stats.style.display = "none";
            // Note: parkedView display handled by Firebase listener
        }
    }

    // --- Tracking Logic ---
    function updatePosition(pos) {
        if (!isRiding) return;
        const { latitude: lat, longitude: lng, speed, accuracy } = pos.coords;
        currentCoords = { lat, lng };
        const s = speed ? speed * 3.6 : 0;
        
        document.getElementById("speed").innerText = Math.round(s);
        document.getElementById("accuracy").innerText = Math.round(accuracy);
        document.getElementById("gps-badge").innerText = `GPS ACTIVE (${Math.round(accuracy)}m)`;
        
        if (accuracy < 100) {
            set(ref(db, "bike/lat"), lat);
            set(ref(db, "bike/lng"), lng);
            set(ref(db, "bike/speed"), s);
            set(ref(db, "bike/time"), Date.now());
            set(ref(db, "bike/accuracy"), accuracy);
            fetchAddress(lat, lng);
        }
    }

    async function fetchAddress(lat, lng) {
        try {
            const r = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`);
            const d = await r.json();
            currentAddress = d.display_name.split(',').slice(0,3).join(',');
            document.getElementById("address").innerText = currentAddress;
            set(ref(db, "bike/address"), currentAddress);
        } catch(e) {}
    }

    // --- Motion / Safety ---
    function handleMotion(event) {
        // Theft check (always monitoring if locked)
        // Add 1.5s arming delay to allow user to settle phone
        if (isLocked && !isTheftAlert && (Date.now() - lastLockTime > 1500)) {
            const acc = event.accelerationIncludingGravity;
            if (acc) {
                const mag = Math.sqrt(acc.x**2 + acc.y**2 + acc.z**2);
                // SENSITIVITY: Lowered threshold from 3.5 to 0.8 for "small movement"
                if (Math.abs(mag - 9.8) > 0.8) set(ref(db, "bike/theft"), true);
            }
        }
        if (!isRiding) return;
        const acc = event.acceleration;
        if (acc && acc.x !== null) {
            const mag = Math.sqrt(acc.x**2 + acc.y**2 + acc.z**2);
            if (mag > 25) triggerCrashAlert();
        }
    }

    function triggerCrashAlert() {
        if (crashTimer) return;
        document.getElementById("crash-overlay").style.display = "flex";
        let c = 10;
        crashTimer = setInterval(() => {
            c--;
            document.getElementById("countdown").innerText = c;
            if (c <= 0) { sendEmergency(); cancelCrashAlert(); }
        }, 1000);
    }

    window.cancelCrashAlert = () => {
        clearInterval(crashTimer); crashTimer = null;
        document.getElementById("crash-overlay").style.display = "none";
    };

    function sendEmergency() {
        set(ref(db, "bike/emergency"), true);
        log("Emergency Alert Sent!");
    }

    // --- Anti-Theft / Siren ---
    onValue(ref(db, "bike/locked"), (s) => {
        isLocked = s.val() === true;
        if (isLocked) lastLockTime = Date.now();
        document.getElementById("lock-badge").style.display = isLocked ? "block" : "none";
        if (!isLocked && isTheftAlert) {
            set(ref(db, "bike/theft"), false);
        }
    });

    onValue(ref(db, "bike/isParked"), (s) => {
        const isParked = s.val() === true;
        const parkedView = document.getElementById("parked-view");
        const rideBtn = document.getElementById("start-ride-btn");
        const liveStats = document.getElementById("live-stats");

        if (isParked) {
            parkedView.style.display = "flex";
            rideBtn.style.display = "none";
            liveStats.style.display = "none";
        } else {
            parkedView.style.display = "none";
            rideBtn.style.display = "flex";
            // liveStats naturally depends on isRiding
        }
    });

    onValue(ref(db, "bike/theft"), (s) => {
        isTheftAlert = s.val() === true;
        if (isTheftAlert) { startSiren(); document.body.style.background = "#450a0a"; }
        else { stopSiren(); document.body.style.background = "var(--bg)"; }
    });

    function startSiren() {
        if (alarmInterval) return;
        if (!audioCtx) audioCtx = new AudioContext();
        alarmInterval = setInterval(() => {
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.type = 'triangle';
            o.frequency.setValueAtTime(800 + Math.sin(audioCtx.currentTime*10)*200, audioCtx.currentTime);
            g.gain.setValueAtTime(0.3, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + 0.4);
        }, 500);
    }
    function stopSiren() { clearInterval(alarmInterval); alarmInterval = null; }

    function log(m) { document.getElementById("log-panel").innerText = m; }
</script>
</body>
</html>
