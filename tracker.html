<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Phantom Tracker | Ride Mode</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --primary: #3b82f6;
            --danger: #ef4444;
            --success: #10b981;
            --bg: #0b1220;
            --glass: rgba(22, 32, 51, 0.8);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body { 
            margin: 0; 
            font-family: 'Outfit', sans-serif; 
            background: var(--bg); 
            color: white; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
            transition: background 0.5s ease;
        }

        /* Glass Container */
        .container {
            width: 85%;
            max-width: 400px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 40px 25px;
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .header {
            margin-bottom: 10px;
        }
        .brand {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(45deg, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Large Start Button */
        #start-ride-btn {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: var(--primary);
            border: 8px solid rgba(59, 130, 246, 0.2);
            color: white;
            font-family: 'Outfit';
            font-weight: 800;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.4);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin: 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
        }
        #start-ride-btn:active { transform: scale(0.9); }
        #start-ride-btn.riding {
            background: var(--danger);
            box-shadow: 0 0 30px rgba(239, 68, 68, 0.4);
            border-color: rgba(239, 68, 68, 0.2);
        }

        /* Stats Grid (Visible when riding) */
        .stats-grid {
            display: none;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }
        .stat-box {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 15px;
            border: 1px solid var(--glass-border);
        }
        .label { font-size: 0.7rem; color: #94a3b8; text-transform: uppercase; margin-bottom: 5px; }
        .value { font-size: 1.4rem; font-weight: 700; color: white; }

        /* Status Badges */
        .status-area {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 10px;
        }
        .badge {
            font-size: 0.65rem;
            font-weight: 700;
            padding: 5px 12px;
            border-radius: 20px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .badge-gps { background: rgba(59, 130, 246, 0.2); color: #3b82f6; }
        .badge-safety { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .badge-locked { background: rgba(249, 115, 22, 0.2); color: #f97316; display: none; }

        /* Crash Overlay */
        #crash-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--danger);
            z-index: 5000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }
        .countdown { font-size: 6rem; font-weight: 900; margin: 20px 0; }
        .cancel-btn {
            background: white; color: var(--danger); border: none;
            padding: 15px 40px; border-radius: 12px; font-weight: 800; cursor: pointer;
        }

        #log-panel {
            position: fixed;
            bottom: 10px; width: 90%;
            font-size: 0.6rem; color: #475569;
            max-height: 40px; overflow: hidden;
        }
    </style>
</head>
<body>

<div id="crash-overlay">
    <i class="fas fa-triangle-exclamation fa-4x"></i>
    <h1 style="font-size: 2.5rem; margin: 10px 0;">CRASH DETECTED!</h1>
    <div class="countdown" id="countdown">10</div>
    <p style="margin-bottom: 30px;">Emergency alert will be sent in <span id="secs">10</span> seconds.</p>
    <div style="display: flex; gap: 15px;">
        <button class="cancel-btn" onclick="cancelCrashAlert()">I AM OK (CANCEL)</button>
        <a href="tel:112" style="text-decoration: none;">
            <button style="background: var(--bg); color: white; border: 2px solid white; padding: 15px 30px; border-radius: 12px; font-weight: 800; cursor: pointer;">
                <i class="fas fa-phone"></i> CALL SOS
            </button>
        </a>
    </div>
</div>

<div class="container">
    <div class="header">
        <div class="brand">PHANTOM</div>
        <p style="font-size: 0.8rem; color: #94a3b8; margin: 5px 0;">Premium Ride Intelligence</p>
    </div>

    <button id="start-ride-btn" onclick="toggleRide()">START RIDE</button>

    <div id="stats-view" class="stats-grid">
        <div class="stat-box">
            <div class="label">Speed</div>
            <div id="speed" class="value">0</div>
            <div style="font-size: 0.6rem; color: #64748b;">km/h</div>
        </div>
        <div class="stat-box">
            <div class="label">Accuracy</div>
            <div id="accuracy" class="value">--</div>
            <div style="font-size: 0.6rem; color: #64748b;">meters</div>
        </div>
        <div class="stat-box" style="grid-column: span 2;">
            <div class="label">Current Location</div>
            <div id="address" class="value" style="font-size: 0.9rem; font-weight: 400; color: #3b82f6;">---</div>
        </div>
    </div>

    <div class="status-area">
        <div class="badge badge-gps" id="gps-badge"><i class="fas fa-satellite"></i> GPS SEARCHING</div>
        <div class="badge badge-safety" id="safety-badge" style="display:none;"><i class="fas fa-shield-halved"></i> SAFETY ON</div>
        <div id="lock-badge" class="badge badge-locked"><i class="fas fa-lock"></i> SECURED</div>
    </div>
</div>

<div id="log-panel">System Initialized. Waiting for rider...</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCx75fIPlI9Ezn9S6l8vZnsi1qDlP6nuoo",
        authDomain: "phantom-raiders.firebaseapp.com",
        databaseURL: "https://phantom-raiders-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "phantom-raiders",
        storageBucket: "phantom-raiders.firebasestorage.app",
        messagingSenderId: "1055222458613",
        appId: "1:1055222458613:web:75d48960bbb72a3ff7bdbc",
        measurementId: "G-3GX5D8RDMW"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // --- State ---
    let isRiding = false;
    let isLocked = false;
    let isTheftAlert = false;
    let watchId = null;
    let alarmInterval = null;
    let audioCtx = null;
    let crashTimer = null;

    // --- Core Logic ---
    window.toggleRide = async () => {
        if (!isRiding) {
            await startRide();
        } else {
            stopRide();
        }
    };

    async function startRide() {
        try {
            // 1. Permissions (iOS requires user gesture, which this click is)
            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                const permission = await DeviceMotionEvent.requestPermission();
                if (permission !== 'granted') {
                    alert("Motion permission required for crash detection.");
                    return;
                }
            }

            // 2. UI Updates
            isRiding = true;
            const btn = document.getElementById("start-ride-btn");
            btn.innerText = "STOP RIDE";
            btn.classList.add("riding");
            document.getElementById("stats-view").style.display = "grid";
            document.getElementById("safety-badge").style.display = "flex";
            log("Ride Started. Crash detection active.");

            // 3. Start GPS
            watchId = navigator.geolocation.watchPosition(updatePosition, handleGPSError, {
                enableHighAccuracy: true,
                maximumAge: 0
            });

            // 4. Start Crash Detection
            window.addEventListener('devicemotion', handleMotion);
        } catch (e) {
            log("Error starting ride: " + e.message);
        }
    }

    function stopRide() {
        isRiding = false;
        const btn = document.getElementById("start-ride-btn");
        btn.innerText = "START RIDE";
        btn.classList.remove("riding");
        document.getElementById("stats-view").style.display = "none";
        document.getElementById("safety-badge").style.display = "none";
        
        if (watchId) navigator.geolocation.clearWatch(watchId);
        window.removeEventListener('devicemotion', handleMotion);
        
        // Reset Firebase speed but keep last location
        set(ref(db, "bike/speed"), 0);
        log("Ride Stopped.");
    }

    // --- GPS Logic ---
    function updatePosition(pos) {
        if (!isRiding) return;
        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;
        const speed = pos.coords.speed ? pos.coords.speed * 3.6 : 0;
        const accuracy = pos.coords.accuracy;

        document.getElementById("speed").innerText = Math.round(speed);
        document.getElementById("accuracy").innerText = Math.round(accuracy);
        document.getElementById("gps-badge").innerHTML = `<i class="fas fa-satellite"></i> GPS ACTIVE (${Math.round(accuracy)}m)`;
        
        if (accuracy < 80) {
            set(ref(db, "bike"), { 
                lat, lng, speed, 
                time: Date.now(), 
                accuracy,
                isRiding: true
            });
            updateAddress(lat, lng);
        }
    }

    async function updateAddress(lat, lng) {
        try {
            const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`);
            const data = await res.json();
            let addr = "Location Found";
            if (data.address) {
                const parts = [
                    data.address.road || data.address.pedestrian,
                    data.address.suburb || data.address.neighbourhood,
                    data.address.city || data.address.town
                ].filter(Boolean);
                addr = parts.join(", ");
            }
            document.getElementById("address").innerText = addr;
            set(ref(db, "bike/address"), addr);
        } catch (e) {}
    }

    // --- Motion / Crash Logic ---
    function handleMotion(event) {
        // Theft check (always monitoring if locked)
        if (isLocked && !isTheftAlert) {
            const acc = event.accelerationIncludingGravity;
            if (acc) {
                const mag = Math.sqrt(acc.x**2 + acc.y**2 + acc.z**2);
                if (Math.abs(mag - 9.8) > 3.0) set(ref(db, "bike/theft"), true);
            }
        }

        if (!isRiding) return;

        // Crash Detection (Linear acceleration)
        const acc = event.acceleration;
        if (acc && acc.x !== null) {
            const crashMag = Math.sqrt(acc.x**2 + acc.y**2 + acc.z**2);
            if (crashMag > 22) { // Threshold ~2.2G
                triggerCrashAlert();
            }
        }
    }

    function triggerCrashAlert() {
        if (crashTimer) return;
        document.getElementById("crash-overlay").style.display = "flex";
        let count = 10;
        document.getElementById("countdown").innerText = count;
        document.getElementById("secs").innerText = count;
        
        crashTimer = setInterval(() => {
            count--;
            document.getElementById("countdown").innerText = count;
            document.getElementById("secs").innerText = count;
            if (count <= 0) {
                sendEmergency();
                cancelCrashAlert();
            }
        }, 1000);
    }

    window.cancelCrashAlert = () => {
        clearInterval(crashTimer);
        crashTimer = null;
        document.getElementById("crash-overlay").style.display = "none";
    };

    function sendEmergency() {
        navigator.geolocation.getCurrentPosition((pos) => {
            set(ref(db, "bike/emergency"), true);
            set(ref(db, "bike/crash"), {
                time: Date.now(),
                lat: pos.coords.latitude,
                lng: pos.coords.longitude
            });
            alert("EMERGENCY SIGNAL SENT!");
        });
    }

    // --- Anti-Theft / Siren ---
    onValue(ref(db, "bike/locked"), (snap) => {
        isLocked = snap.val() === true;
        document.getElementById("lock-badge").style.display = isLocked ? "flex" : "none";
        if (!isLocked && isTheftAlert) {
            set(ref(db, "bike/theft"), false);
        }
    });

    onValue(ref(db, "bike/theft"), (snap) => {
        isTheftAlert = snap.val() === true;
        if (isTheftAlert) {
            startSiren();
            document.body.style.background = "#450a0a";
        } else {
            stopSiren();
            document.body.style.background = "var(--bg)";
        }
    });

    function startSiren() {
        if (alarmInterval) return;
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        alarmInterval = setInterval(() => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1400, audioCtx.currentTime + 0.4);
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.4);
        }, 500);
    }

    function stopSiren() {
        if (alarmInterval) {
            clearInterval(alarmInterval);
            alarmInterval = null;
        }
    }

    // --- Helpers ---
    function log(msg) {
        document.getElementById("log-panel").innerText = msg;
    }
    function handleGPSError(err) {
        log("GPS Error: " + err.message);
    }
</script>
</body>
</html>
