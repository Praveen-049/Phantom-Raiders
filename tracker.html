<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bike Tracker - Running</title>
    <style>
        :root {
            --bg: #0b1220;
            --card: #162033;
            --box: #0f1a2e;
            --success: #10b981;
            --danger: #ef4444;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: var(--bg);
            color: white;
            display: flex;
            height: 100vh;
            margin: 0;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: var(--card);
            padding: 30px;
            border-radius: 16px;
            text-align: center;
            width: 300px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        h2 { margin-top: 0; font-weight: 800; color: #3b82f6; }
        .status-box {
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .connected { background: rgba(16, 185, 129, 0.2); color: var(--success); }
        .disconnected { background: rgba(239, 68, 68, 0.2); color: var(--danger); }
        
        .box {
            background: var(--box);
            padding: 12px;
            margin-top: 10px;
            border-radius: 8px;
            text-align: left;
            display: flex;
            justify-content: space-between;
        }
        .label { color: #94a3b8; font-size: 0.8rem; text-transform: uppercase; }
        .value { font-weight: 700; color: white; }
        .address-box {
            background: var(--box);
            padding: 12px;
            margin-top: 10px;
            border-radius: 8px;
            text-align: left;
            font-size: 0.85rem;
            line-height: 1.4;
            min-height: 40px;
        }
        #address { color: #3b82f6; font-weight: 600; }
        #error-log {
            margin-top: 15px;
            font-size: 0.7rem;
            color: var(--danger);
            max-height: 60px;
            overflow-y: auto;
            text-align: left;
        }

        /* Crash Overlay */
        #crash-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(239, 68, 68, 0.95);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            text-align: center;
            padding: 20px;
        }
        #crash-overlay h1 { font-size: 3rem; margin-bottom: 10px; }
        #crash-overlay p { font-size: 1.2rem; margin-bottom: 30px; }
        .cancel-btn {
            background: white;
            color: var(--danger);
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        #crash-timer { font-size: 4rem; font-weight: 800; margin-bottom: 20px; }

        /* Settings Card */
        .settings-card {
            background: var(--card);
            padding: 20px;
            border-radius: 16px;
            margin-top: 15px;
            width: 300px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .toggle-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #334155;
            transition: .4s;
            border-radius: 24px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px; width: 18px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--success); }
        input:checked + .slider:before { transform: translateX(26px); }
        
        .status-indicator { font-size: 0.75rem; color: #94a3b8; }
        .status-active { color: var(--success); font-weight: bold; }
        .status-idle { color: #64748b; }
    </style>
</head>
<body>

<div class="card">
    <h2>BIKE TRACKER</h2>
    <div id="connection" class="status-box disconnected">Firebase: Disconnected</div>
    <div id="gps-status" style="font-size: 0.8rem; margin-bottom: 10px; color: #94a3b8;">GPS: Waiting...</div>

    <div class="box">
        <span class="label">Latitude</span>
        <span id="lat" class="value">0.000000</span>
    </div>
    <div class="box">
        <span class="label">Longitude</span>
        <span id="lng" class="value">0.000000</span>
    </div>
    <div class="box">
        <span class="label">Speed</span>
        <span class="value"><span id="speed">0</span> <small>km/h</small></span>
    </div>

    <div class="address-box">
        <div class="label" style="margin-bottom: 5px;">Current Address</div>
        <div id="address">Fetching address...</div>
    </div>

    <div id="error-log"></div>
    <button onclick="triggerCrashAlert()" style="background:none; border:none; color:#334155; font-size:0.6rem; cursor:pointer; margin-top:10px;">[TEST CRASH]</button>
</div>

<div class="settings-card">
    <div class="toggle-row">
        <span style="font-weight: 600; font-size: 0.9rem;">Crash Detection</span>
        <label class="switch">
            <input type="checkbox" id="crash-toggle" onchange="toggleCrashDetection()">
            <span class="slider"></span>
        </label>
    </div>
    <div class="status-indicator">
        Status: <span id="crash-status" class="status-idle">Idle</span>
    </div>
    <div class="status-indicator" style="font-size: 0.7rem;">
        Last: <span id="last-crash-time">Never</span>
    </div>
</div>

<div id="crash-overlay">
    <h1>CRASH DETECTED!</h1>
    <p>Sending emergency alert in...</p>
    <div id="crash-timer">10</div>
    <button class="cancel-btn" onclick="cancelCrash()">I AM OKAY (CANCEL)</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCx75fIPlI9Ezn9S6l8vZnsi1qDlP6nuoo",
        authDomain: "phantom-raiders.firebaseapp.com",
        // Using the exact URL identified from your console link
        databaseURL: "https://phantom-raiders-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "phantom-raiders",
        storageBucket: "phantom-raiders.firebasestorage.app",
        messagingSenderId: "1055222458613",
        appId: "1:1055222458613:web:75d48960bbb72a3ff7bdbc",
        measurementId: "G-3GX5D8RDMW"
    };

    const connectionEl = document.getElementById("connection");
    const gpsStatusEl = document.getElementById("gps-status");
    const errorLogEl = document.getElementById("error-log");

    function logError(msg) {
        const div = document.createElement("div");
        div.textContent = msg;
        errorLogEl.appendChild(div);
    }

    let lastAddressUpdate = 0;
    
    // Initialize Firebase at module level
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    async function updateAddress(lat, lng) {
        const now = Date.now();
        if (now - lastAddressUpdate < 5000) return; // Limit to once every 5 seconds
        lastAddressUpdate = now;

        try {
            const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18&addressdetails=1`, {
                headers: { 'Accept-Language': 'en' }
            });
            if (!res.ok) throw new Error("HTTP " + res.status);
            const data = await res.json();
            const addr = data.display_name || "Address not found";
            document.getElementById("address").innerText = addr;
            
            // Also sync address to Firebase so dashboard can see it
            set(ref(db, "bike/address"), addr);
        } catch (e) {
            console.error("Address fetch failed", e);
            document.getElementById("address").innerText = "Lookup failed: " + e.message;
            logError("Address API: " + e.message);
        }
    }

    try {
        // Real connection monitoring
        onValue(ref(db, ".info/connected"), (snap) => {
            if (snap.val() === true) {
                connectionEl.innerText = "Firebase: Connected ✓";
                connectionEl.className = "status-box connected";
            } else {
                connectionEl.innerText = "Firebase: Disconnected ✗";
                connectionEl.className = "status-box disconnected";
            }
        });

        navigator.geolocation.watchPosition((pos) => {
            const lat = pos.coords.latitude;
            const lng = pos.coords.longitude;
            const speed = pos.coords.speed ? pos.coords.speed * 3.6 : 0;

            document.getElementById("lat").innerText = lat.toFixed(6);
            document.getElementById("lng").innerText = lng.toFixed(6);
            document.getElementById("speed").innerText = Math.round(speed);
            gpsStatusEl.innerText = "GPS: Active Accuracy: " + Math.round(pos.coords.accuracy) + "m";

            // ACCURACY FILTER: Only sync if accuracy is < 60 meters
            if (pos.coords.accuracy > 60) {
                gpsStatusEl.style.color = "#ef4444";
                gpsStatusEl.innerText += " (Poor - Ignoring)";
                return;
            }
            gpsStatusEl.style.color = "#10b981";

            updateAddress(lat, lng);

            set(ref(db, "bike"), {
                lat: lat,
                lng: lng,
                speed: speed,
                time: Date.now()
            }).catch(e => logError("Sync Error: " + e.message));

        }, (err) => {
            gpsStatusEl.innerText = "GPS Error: " + err.message;
            logError("GPS: " + err.message);
        }, {
            enableHighAccuracy: true,
            maximumAge: 0
        });

    } catch (e) {
        logError("Init Error: " + e.message);
    }

    // --- REFINED CRASH DETECTION LOGIC ---
    let crashDetectionEnabled = false;
    let crashDetected = false;
    let timerInterval = null;
    let countdown = 10;
    
    // Limits
    const ACC_SPIKE = 18; // m/s²
    const TILT_ANGLE_CHANGE = 60; // degrees
    const TILT_TIME_LIMIT = 500; // ms
    const SUSTAINED_TILT_ANGLE = 70; // degrees
    const SUSTAINED_TILT_TIME = 3000; // ms
    
    // Tracking state
    let lastOrientation = { beta: 0, gamma: 0, time: 0 };
    let tiltHistory = [];
    let sustainedTiltStart = null;
    let sensorInterval = null;

    window.toggleCrashDetection = async function() {
        const toggle = document.getElementById("crash-toggle");
        if (toggle.checked) {
            const permission = await initCrashDetection();
            if (permission) {
                crashDetectionEnabled = true;
                document.getElementById("crash-status").innerText = "Active";
                document.getElementById("crash-status").className = "status-active";
            } else {
                toggle.checked = false;
                logError("Sensor permissions denied.");
            }
        } else {
            crashDetectionEnabled = false;
            document.getElementById("crash-status").innerText = "Idle";
            document.getElementById("crash-status").className = "status-idle";
            stopSensors();
        }
    };

    async function initCrashDetection() {
        try {
            // Request iOS motion permission
            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                const response = await DeviceMotionEvent.requestPermission();
                if (response !== 'granted') return false;
            }
            
            // Start battery-friendly interval (200ms check)
            startSensors();
            return true;
        } catch (e) {
            logError("Crash Init Error: " + e.message);
            return false;
        }
    }

    function startSensors() {
        window.addEventListener('devicemotion', handleMotion);
        window.addEventListener('deviceorientation', handleOrientation);
        sensorInterval = setInterval(detectCrash, 200);
    }

    function stopSensors() {
        window.removeEventListener('devicemotion', handleMotion);
        window.removeEventListener('deviceorientation', handleOrientation);
        if (sensorInterval) clearInterval(sensorInterval);
    }

    let currentMotion = null;
    let currentOrientation = null;

    function handleMotion(event) {
        if (!crashDetectionEnabled) return;
        currentMotion = event.accelerationIncludingGravity;
    }

    function handleOrientation(event) {
        if (!crashDetectionEnabled) return;
        currentOrientation = {
            beta: event.beta,
            gamma: event.gamma,
            time: performance.now()
        };
    }

    function detectCrash() {
        if (!crashDetectionEnabled || crashDetected) return;

        const now = performance.now();

        // 1. Acceleration Spike
        if (currentMotion) {
            const acc = Math.sqrt(currentMotion.x**2 + currentMotion.y**2 + currentMotion.z**2);
            if (acc > ACC_SPIKE) {
                console.log("Crash detected: Acceleration spike", acc);
                triggerCrashAlert();
                return;
            }
        }

        // 2. Tilt Changes
        if (currentOrientation) {
            const tilt = Math.max(Math.abs(currentOrientation.beta || 0), Math.abs(currentOrientation.gamma || 0));
            
            // Sudden tilt change (> 60 deg in 500ms)
            tiltHistory.push(currentOrientation);
            tiltHistory = tiltHistory.filter(h => now - h.time <= TILT_TIME_LIMIT);
            
            if (tiltHistory.length > 1) {
                const oldest = tiltHistory[0];
                const deltaBeta = Math.abs(currentOrientation.beta - oldest.beta);
                const deltaGamma = Math.abs(currentOrientation.gamma - oldest.gamma);
                if (deltaBeta > TILT_ANGLE_CHANGE || deltaGamma > TILT_ANGLE_CHANGE) {
                    console.log("Crash detected: Sudden tilt");
                    triggerCrashAlert();
                    return;
                }
            }

            // Sustained tilt (> 70 deg for 3s)
            if (tilt > SUSTAINED_TILT_ANGLE) {
                if (!sustainedTiltStart) sustainedTiltStart = now;
                if (now - sustainedTiltStart > SUSTAINED_TILT_TIME) {
                    console.log("Crash detected: Sustained tilt");
                    triggerCrashAlert();
                    return;
                }
            } else {
                sustainedTiltStart = null;
            }
        }
    }

    window.triggerCrashAlert = function() {
        if (crashDetected) return;
        crashDetected = true;
        countdown = 10;
        
        document.getElementById("crash-overlay").style.display = "flex";
        document.getElementById("crash-timer").innerText = countdown;
        document.getElementById("last-crash-time").innerText = new Date().toLocaleTimeString();

        timerInterval = setInterval(() => {
            countdown--;
            document.getElementById("crash-timer").innerText = countdown;
            if (countdown <= 0) {
                clearInterval(timerInterval);
                sendCrashLocation();
            }
        }, 1000);
    }

    window.cancelCrash = function() {
        crashDetected = false;
        clearInterval(timerInterval);
        document.getElementById("crash-overlay").style.display = "none";
        // Reset buffers
        tiltHistory = [];
        sustainedTiltStart = null;
    }

    async function sendCrashLocation() {
        navigator.geolocation.getCurrentPosition((pos) => {
            const lat = pos.coords.latitude;
            const lng = pos.coords.longitude;
            const timestamp = Date.now();

            // Send to Firebase
            set(ref(db, "bike/crash"), {
                detected: true,
                time: timestamp,
                lat: lat,
                lng: lng,
                status: "EMERGENCY_ALERT_SENT"
            });

            // Update existing tracker location too
            set(ref(db, "bike"), {
                lat: lat,
                lng: lng,
                speed: 0,
                time: timestamp,
                emergency: true
            });

            alert("EMERGENCY ALERT SENT TO FIREBASE");
        }, (err) => {
            logError("Crash Location Error: " + err.message);
        }, { enableHighAccuracy: true });
    }

</script>

</body>
</html>
