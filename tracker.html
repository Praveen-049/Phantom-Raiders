<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bike Tracker - Running</title>
    <style>
        :root {
            --bg: #0b1220;
            --card: #162033;
            --box: #0f1a2e;
            --success: #10b981;
            --danger: #ef4444;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: var(--bg);
            color: white;
            display: flex;
            height: 100vh;
            margin: 0;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: var(--card);
            padding: 30px;
            border-radius: 16px;
            text-align: center;
            width: 300px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        h2 { margin-top: 0; font-weight: 800; color: #3b82f6; }
        .status-box {
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .connected { background: rgba(16, 185, 129, 0.2); color: var(--success); }
        .disconnected { background: rgba(239, 68, 68, 0.2); color: var(--danger); }
        
        .box {
            background: var(--box);
            padding: 12px;
            margin-top: 10px;
            border-radius: 8px;
            text-align: left;
            display: flex;
            justify-content: space-between;
        }
        .label { color: #94a3b8; font-size: 0.8rem; text-transform: uppercase; }
        .value { font-weight: 700; color: white; }
        .address-box {
            background: var(--box);
            padding: 12px;
            margin-top: 10px;
            border-radius: 8px;
            text-align: left;
            font-size: 0.85rem;
            line-height: 1.4;
            min-height: 40px;
        }
        #address { color: #3b82f6; font-weight: 600; }
        #error-log {
            margin-top: 15px;
            font-size: 0.7rem;
            color: var(--danger);
            max-height: 60px;
            overflow-y: auto;
            text-align: left;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>BIKE TRACKER</h2>
    <div id="connection" class="status-box disconnected">Firebase: Disconnected</div>
    <div id="gps-status" style="font-size: 0.8rem; margin-bottom: 10px; color: #94a3b8;">GPS: Waiting...</div>

    <div class="box">
        <span class="label">Latitude</span>
        <span id="lat" class="value">0.000000</span>
    </div>
    <div class="box">
        <span class="label">Longitude</span>
        <span id="lng" class="value">0.000000</span>
    </div>
    <div class="box">
        <span class="label">Speed</span>
        <span class="value"><span id="speed">0</span> <small>km/h</small></span>
    </div>

    <div class="address-box">
        <div class="label" style="margin-bottom: 5px;">Current Address</div>
        <div id="address">Fetching address...</div>
    </div>

    <div id="error-log"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCx75fIPlI9Ezn9S6l8vZnsi1qDlP6nuoo",
        authDomain: "phantom-raiders.firebaseapp.com",
        // Using the exact URL identified from your console link
        databaseURL: "https://phantom-raiders-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "phantom-raiders",
        storageBucket: "phantom-raiders.firebasestorage.app",
        messagingSenderId: "1055222458613",
        appId: "1:1055222458613:web:75d48960bbb72a3ff7bdbc",
        measurementId: "G-3GX5D8RDMW"
    };

    const connectionEl = document.getElementById("connection");
    const gpsStatusEl = document.getElementById("gps-status");
    const errorLogEl = document.getElementById("error-log");

    function logError(msg) {
        const div = document.createElement("div");
        div.textContent = msg;
        errorLogEl.appendChild(div);
    }

    let lastAddressUpdate = 0;
    async function updateAddress(lat, lng) {
        const now = Date.now();
        if (now - lastAddressUpdate < 5000) return; // Limit to once every 5 seconds
        lastAddressUpdate = now;

        try {
            const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18&addressdetails=1`);
            const data = await res.json();
            const addr = data.display_name || "Address not found";
            document.getElementById("address").innerText = addr;
            
            // Also sync address to Firebase so dashboard can see it
            set(ref(db, "bike/address"), addr);
        } catch (e) {
            console.error("Address fetch failed", e);
        }
    }

    try {
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        // Real connection monitoring
        onValue(ref(db, ".info/connected"), (snap) => {
            if (snap.val() === true) {
                connectionEl.innerText = "Firebase: Connected ✓";
                connectionEl.className = "status-box connected";
            } else {
                connectionEl.innerText = "Firebase: Disconnected ✗";
                connectionEl.className = "status-box disconnected";
            }
        });

        navigator.geolocation.watchPosition((pos) => {
            const lat = pos.coords.latitude;
            const lng = pos.coords.longitude;
            const speed = pos.coords.speed ? pos.coords.speed * 3.6 : 0;

            document.getElementById("lat").innerText = lat.toFixed(6);
            document.getElementById("lng").innerText = lng.toFixed(6);
            document.getElementById("speed").innerText = Math.round(speed);
            gpsStatusEl.innerText = "GPS: Active Accuracy: " + Math.round(pos.coords.accuracy) + "m";

            updateAddress(lat, lng);

            set(ref(db, "bike"), {
                lat: lat,
                lng: lng,
                speed: speed,
                time: Date.now()
            }).catch(e => logError("Sync Error: " + e.message));

        }, (err) => {
            gpsStatusEl.innerText = "GPS Error: " + err.message;
            logError("GPS: " + err.message);
        }, {
            enableHighAccuracy: true,
            maximumAge: 0
        });

    } catch (e) {
        logError("Init Error: " + e.message);
    }

</script>

</body>
</html>
