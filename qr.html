<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phantom | Premium Access</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root {
            --primary: #a855f7;
            --accent: #fbbf24;
            --bg: #050505;
            --glass: rgba(15, 10, 25, 0.85);
            --glass-border: rgba(168, 85, 247, 0.2);
        }

        body {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 20% 30%, rgba(139, 92, 246, 0.05) 0%, transparent 50%),
                              radial-gradient(circle at 80% 70%, rgba(251, 191, 36, 0.03) 0%, transparent 50%);
        }

        .container {
            width: 90%;
            max-width: 450px;
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 45px 35px;
            border-radius: 40px;
            border: 1px solid var(--glass-border);
            text-align: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            position: relative;
        }

        .brand {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: 6px;
            margin-bottom: 35px;
            background: linear-gradient(135deg, #fff 0%, var(--accent) 50%, var(--primary) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .config-card {
            background: rgba(168, 85, 247, 0.03);
            padding: 24px;
            border-radius: 25px;
            border: 1px solid var(--glass-border);
            margin-bottom: 25px;
            text-align: left;
        }

        label {
            font-size: 0.7rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: block;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .mode-toggle {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .mode-btn {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: #94a3b8;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
            transition: 0.3s;
        }
        .mode-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 5px 15px rgba(168, 85, 247, 0.3);
        }

        input {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
            padding: 16px;
            border-radius: 14px;
            color: white;
            font-family: inherit;
            font-size: 1rem;
            margin-bottom: 10px;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: var(--primary); background: rgba(0,0,0,0.4); }

        #qrcode {
            background: white;
            padding: 15px;
            border-radius: 25px;
            display: inline-block;
            margin: 25px 0;
            box-shadow: 0 10px 40px rgba(168, 85, 247, 0.2);
            border: 5px solid var(--glass-border);
        }

        .btn-vip {
            background: linear-gradient(135deg, var(--accent), #d97706);
            color: #000;
            border: none;
            padding: 18px;
            border-radius: 18px;
            font-weight: 800;
            cursor: pointer;
            width: 100%;
            font-size: 1.1rem;
            transition: 0.3s;
            box-shadow: 0 10px 30px rgba(251, 191, 36, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-vip:hover { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(251, 191, 36, 0.5); }

        .footer-hint {
            font-size: 0.75rem;
            color: #64748b;
            margin-top: 25px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="brand">PHANTOM</div>
    
    <div class="config-card">
        <label>Device Mode</label>
        <div class="mode-toggle">
            <button id="btn-rider" class="mode-btn" onclick="setMode('rider')">Rider</button>
            <button id="btn-viewer" class="mode-btn active" onclick="setMode('viewer')">Remote</button>
        </div>

        <label>Deployment URL</label>
        <input type="text" id="base-url" placeholder="https://..." oninput="generateQR()">
        
        <label>Rider Name</label>
        <input type="text" id="rider-name" placeholder="Praveen" oninput="generateQR()">
    </div>
    
    <div id="qrcode"></div>
    
    <div id="qr-link" style="font-size: 0.6rem; color: #475569; word-break: break-all; margin-bottom: 25px;">---</div>
    
    <button class="btn-vip" onclick="window.print()">
        <i class="fas fa-crown"></i> GENERATE KEY
    </button>
    
    <p class="footer-hint">Stick this QR on your machine for instant, encrypted access.</p>
</div>

<script>
    const qrDiv = document.getElementById("qrcode");
    let qrcode = new QRCode(qrDiv, {
        width: 180,
        height: 180,
        colorDark : "#050505",
        colorLight : "#ffffff",
        correctLevel : QRCode.CorrectLevel.H
    });

    let activeMode = 'viewer';

    function setMode(mode) {
        activeMode = mode;
        document.getElementById("btn-rider").className = mode === 'rider' ? 'mode-btn active' : 'mode-btn';
        document.getElementById("btn-viewer").className = mode === 'viewer' ? 'mode-btn active' : 'mode-btn';
        generateQR();
    }

    // Auto-fill
    let currentUrl = window.location.href.replace('qr.html', '');
    if (currentUrl.startsWith('file://')) {
        currentUrl = "https://Praveen-049.github.io/Phantom-Raiders/";
    }
    document.getElementById("base-url").value = currentUrl;

    function generateQR() {
        const name = document.getElementById("rider-name").value.trim() || "Rider";
        const baseUrl = document.getElementById("base-url").value.trim();
        const file = activeMode === 'rider' ? 'tracker.html' : 'index.html';
        const fullUrl = `${baseUrl}${file}?rider=${encodeURIComponent(name)}`;
        
        qrcode.clear();
        qrcode.makeCode(fullUrl);
        document.getElementById("qr-link").innerText = fullUrl;
    }

    generateQR();
</script>

</body>
</html>
