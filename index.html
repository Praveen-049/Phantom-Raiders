<!DOCTYPE html>
<html>

<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
    }

    #map {
      height: 100vh;
    }

    .panel {
      position: absolute;
      top: 10px;
      left: 10px;
      background: white;
      padding: 10px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
      z-index: 1000;
      width: 180px;
    }

    .box {
      margin-top: 8px;
      font-size: 14px;
    }
  </style>

</head>

<body>

  <div class="panel">
    <b>Bike Tracker</b>

    <div class="box">
      Speed: <span id="speed">0</span> km/h
    </div>

    <div class="box">
      Last update: <span id="time">-</span>
    </div>

    <div class="box">
      Points: <span id="points">0</span>
    </div>

  </div>

  <div id="map"></div>

  <script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCx75fIPlI9Ezn9S6l8vZnsi1qDlP6nuoo",
      authDomain: "phantom-raiders.firebaseapp.com",
      databaseURL: "https://phantom-raiders-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "phantom-raiders",
      storageBucket: "phantom-raiders.firebasestorage.app",
      messagingSenderId: "1055222458613",
      appId: "1:1055222458613:web:75d48960bbb72a3ff7bdbc",
      measurementId: "G-3GX5D8RDMW"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase();

    var map = L.map('map').setView([13.0827, 80.2707], 13);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
      .addTo(map);

    var marker = L.marker([0, 0]).addTo(map);
    var route = L.polyline([], { color: 'blue' }).addTo(map);

    let count = 0;

    onValue(ref(db, "bike"), (snap) => {

      const d = snap.val();

      if (!d) return;

      marker.setLatLng([d.lat, d.lng]);
      map.setView([d.lat, d.lng]);

      route.addLatLng([d.lat, d.lng]);

      document.getElementById("speed").innerText =
        Math.round(d.speed || 0);

      document.getElementById("time").innerText =
        new Date(d.time).toLocaleTimeString();

      count++;
      document.getElementById("points").innerText = count;

    });

  </script>

</body>

</html>
