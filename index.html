<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bike Dashboard - Live</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: 'Segoe UI', Arial; background: #f0f2f5; }
        #map { height: 100vh; width: 100%; }
        .panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            z-index: 1000;
            width: 220px;
        }
        .header { font-weight: 800; color: #1e293b; margin-bottom: 15px; display: flex; align-items: center; }
        .status-dot { width: 8px; height: 8px; background: #ef4444; border-radius: 50%; margin-right: 8px; }
        .connected .status-dot { background: #10b981; box-shadow: 0 0 8px #10b981; }
        .box { margin-top: 12px; font-size: 14px; color: #475569; }
        .value { font-weight: 700; color: #1e293b; font-size: 1.1rem; }
        #sync-time { font-size: 0.75rem; color: #94a3b8; margin-top: 4px; }
    </style>
</head>
<body>

<div id="status-panel" class="panel">
    <div class="header"><span class="status-dot"></span> BIKE DASHBOARD</div>
    
    <div id="conn-text" style="font-size: 0.7rem; color: #94a3b8; margin-bottom: 10px;">Connecting to Firebase...</div>

    <div class="box">
        Speed: <div id="speed" class="value">0 km/h</div>
    </div>

    <div class="box">
        Distance from Bike: <div id="distance" class="value">calculating...</div>
    </div>

    <div class="box">
        Address: <div id="address" style="font-size: 0.8rem; color: #3b82f6; font-weight: 600; margin-top: 5px;">Fetching...</div>
    </div>

    <div id="sync-time">Last update: --:--</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCx75fIPlI9Ezn9S6l8vZnsi1qDlP6nuoo",
        authDomain: "phantom-raiders.firebaseapp.com",
        databaseURL: "https://phantom-raiders-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "phantom-raiders",
        storageBucket: "phantom-raiders.firebasestorage.app",
        messagingSenderId: "1055222458613",
        appId: "1:1055222458613:web:75d48960bbb72a3ff7bdbc",
        measurementId: "G-3GX5D8RDMW"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const map = L.map('map').setView([13.0827, 80.2707], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    // Custom Bike Icon
    const bikeIcon = L.divIcon({
        className: 'custom-bike-icon',
        html: `<svg viewBox="0 0 512 512" width="36" height="36" fill="#3b82f6">
                <path d="M416 96c26.5 0 48-21.5 48-48S442.5 0 416 0s-48 21.5-48 48 21.5 48 48 48zm-80 64c-17.7 0-32 14.3-32 32v128c0 17.7 14.3 32 32 32s32-14.3 32-32V192c0-17.7-14.3-32-32-32zm-128 0c-17.7 0-32 14.3-32 32v128c0 17.7 14.3 32 32 32s32-14.3 32-32V192c0-17.7-14.3-32-32-32zM96 96c26.5 0 48-21.5 48-48S122.5 0 96 0 48 21.5 48 48s21.5 48 48 48zm400 352H16c-8.8 0-16 7.2-16 16s7.2 16 16 16h480c8.8 0 16-7.2 16-16s-7.2-16-16-16zm-336-64V128c0-17.7-14.3-32-32-32s-32 14.3-32 32v256c0 17.7 14.3 32 32 32s32-14.3 32-32zm256 0V128c0-17.7-14.3-32-32-32s-32 14.3-32 32v256c0 17.7 14.3 32 32 32s32-14.3 32-32z"/>
                <path d="M376.1 144H135.9c-13.3 0-25.5 8.1-30.8 20.2l-64 144C34.6 323.2 41.5 336 53.3 336H458.7c11.8 0 18.7-12.8 12.3-27.8l-64-144c-5.3-12.1-17.5-20.2-30.9-20.2z"/>
              </svg>`,
        iconSize: [36, 36],
        iconAnchor: [18, 18]
    });

    const marker = L.marker([0, 0], { icon: bikeIcon }).addTo(map);
    const route = L.polyline([], { color: '#3b82f6', weight: 4 }).addTo(map);

    const statusPanel = document.getElementById("status-panel");
    const connText = document.getElementById("conn-text");
    const speedEl = document.getElementById("speed");
    const distanceEl = document.getElementById("distance");
    const timeEl = document.getElementById("sync-time");

    let firstLoad = true;
    let bikePos = null;
    let userPos = null;

    function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371; // Radius of the earth in km
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                  Math.sin(dLon / 2) * Math.sin(dLon / 2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        const d = R * c; // Distance in km
        return d;
    }

    function updateDistanceUI() {
        if (bikePos && userPos) {
            const dist = getDistance(userPos.lat, userPos.lng, bikePos.lat, bikePos.lng);
            if (dist < 1) {
                distanceEl.innerText = Math.round(dist * 1000) + " m";
            } else {
                distanceEl.innerText = dist.toFixed(2) + " km";
            }
        }
    }

    // Track Dashboard User's Location
    navigator.geolocation.watchPosition((pos) => {
        userPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
        updateDistanceUI();
    }, (err) => console.log("User Geolocation error:", err));

    // Connection monitoring
    onValue(ref(db, ".info/connected"), (snap) => {
        if (snap.val() === true) {
            statusPanel.classList.add("connected");
            connText.innerText = "Connected to Live Database";
        } else {
            statusPanel.classList.remove("connected");
            connText.innerText = "Offline - Reconnecting...";
        }
    });

    onValue(ref(db, "bike"), (snap) => {
        const d = snap.val();
        if (!d || !d.lat) return;

        bikePos = { lat: d.lat, lng: d.lng };
        const pos = [d.lat, d.lng];
        marker.setLatLng(pos);
        route.addLatLng(pos);

        if (firstLoad) {
            map.setView(pos, 16);
            firstLoad = false;
        } else {
            map.panTo(pos);
        }

        speedEl.innerText = Math.round(d.speed || 0) + " km/h";
        timeEl.innerText = "Last update: " + new Date(d.time).toLocaleTimeString();
        
        if (d.address) {
            document.getElementById("address").innerText = d.address;
        }

        updateDistanceUI();
    });

</script>

</body>
</html>
