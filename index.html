<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bike Dashboard - Live</title>
    <!-- Removed Leaflet CSS -->
    <style>
        body { margin: 0; font-family: 'Segoe UI', Arial; background: #f0f2f5; }
        #map { height: 100vh; width: 100%; }
        .panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            z-index: 1000;
            width: 220px;
        }
        .header { font-weight: 800; color: #1e293b; margin-bottom: 15px; display: flex; align-items: center; }
        .status-dot { width: 8px; height: 8px; background: #ef4444; border-radius: 50%; margin-right: 8px; }
        .connected .status-dot { background: #10b981; box-shadow: 0 0 8px #10b981; }
        .box { margin-top: 12px; font-size: 14px; color: #475569; }
        .value { font-weight: 700; color: #1e293b; font-size: 1.1rem; }
        #sync-time { font-size: 0.75rem; color: #94a3b8; margin-top: 4px; }

        /* Emergency Styles */
        #emergency-banner {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: #ef4444;
            color: white;
            text-align: center;
            padding: 15px;
            font-weight: 800;
            font-size: 1.2rem;
            z-index: 2000;
            display: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

<div id="emergency-banner">
    ⚠️ CRASH DETECTED! EMERGENCY ALERT ⚠️
</div>

<div id="status-panel" class="panel">
    <div class="header"><span class="status-dot"></span> BIKE DASHBOARD</div>
    
    <div id="conn-text" style="font-size: 0.7rem; color: #94a3b8; margin-bottom: 10px;">Connecting to Firebase...</div>

    <div class="box">
        Speed: <div id="speed" class="value">0 km/h</div>
    </div>

    <div class="box">
        Distance from Bike: <div id="distance" class="value">calculating...</div>
    </div>

    <div class="box">
        Address: <div id="address" style="font-size: 0.8rem; color: #3b82f6; font-weight: 600; margin-top: 5px;">Fetching...</div>
    </div>

    <div id="sync-time">Last update: --:--</div>

    <div id="debug-info" style="font-size: 0.6rem; color: #94a3b8; margin-top: 15px; border-top: 1px solid #eee; padding-top: 10px; display: none;">
        <div>Bike: <span id="bike-latlng">0,0</span></div>
        <div>User: <span id="user-latlng">0,0</span> (±<span id="user-acc">0</span>m)</div>
    </div>
    <button onclick="toggleDebug()" style="background:none; border:none; color:#cbd5e1; font-size:0.5rem; cursor:pointer; margin-top:5px;">Show Debug Info</button>
</div>

<div id="map"></div>

<!-- Google Maps API -->
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCx75fIPlI9Ezn9S6l8vZnsi1qDlP6nuoo"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCx75fIPlI9Ezn9S6l8vZnsi1qDlP6nuoo",
        authDomain: "phantom-raiders.firebaseapp.com",
        databaseURL: "https://phantom-raiders-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "phantom-raiders",
        storageBucket: "phantom-raiders.firebasestorage.app",
        messagingSenderId: "1055222458613",
        appId: "1:1055222458613:web:75d48960bbb72a3ff7bdbc",
        measurementId: "G-3GX5D8RDMW"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Google Maps Initialization
    const map = new google.maps.Map(document.getElementById('map'), {
        center: { lat: 13.0827, lng: 80.2707 },
        zoom: 13,
        mapId: 'BIKE_DASHBOARD' // Optional, for advanced markers if enabled
    });

    // Custom Bike Icon for Google Maps
    const bikeIcon = {
        path: "M416 96c26.5 0 48-21.5 48-48S442.5 0 416 0s-48 21.5-48 48 21.5 48 48 48zm-80 64c-17.7 0-32 14.3-32 32v128c0 17.7 14.3 32 32 32s32-14.3 32-32V192c0-17.7-14.3-32-32-32zm-128 0c-17.7 0-32 14.3-32 32v128c0 17.7 14.3 32 32 32s32-14.3 32-32V192c0-17.7-14.3-32-32-32zM96 96c26.5 0 48-21.5 48-48S122.5 0 96 0 48 21.5 48 48s21.5 48 48 48zm400 352H16c-8.8 0-16 7.2-16 16s7.2 16 16 16h480c8.8 0 16-7.2 16-16s-7.2-16-16-16zm-336-64V128c0-17.7-14.3-32-32-32s-32 14.3-32 32v256c0 17.7 14.3 32 32 32s32-14.3 32-32zm256 0V128c0-17.7-14.3-32-32-32s-32 14.3-32 32v256c0 17.7 14.3 32 32 32s32-14.3 32-32z M376.1 144H135.9c-13.3 0-25.5 8.1-30.8 20.2l-64 144C34.6 323.2 41.5 336 53.3 336H458.7c11.8 0 18.7-12.8 12.3-27.8l-64-144c-5.3-12.1-17.5-20.2-30.9-20.2z",
        fillColor: "#3b82f6",
        fillOpacity: 1,
        strokeWeight: 0,
        scale: 0.07, // Scale factor for the path
        anchor: new google.maps.Point(256, 256)
    };

    const marker = new google.maps.Marker({
        position: { lat: 0, lng: 0 },
        map: map,
        icon: bikeIcon
    });

    const route = new google.maps.Polyline({
        path: [],
        geodesic: true,
        strokeColor: '#3b82f6',
        strokeOpacity: 1.0,
        strokeWeight: 4,
        map: map
    });

    const statusPanel = document.getElementById("status-panel");
    const connText = document.getElementById("conn-text");
    const speedEl = document.getElementById("speed");
    const distanceEl = document.getElementById("distance");
    const timeEl = document.getElementById("sync-time");

    let firstLoad = true;
    let bikePos = null;
    let userPos = null;

    function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371; // Radius of the earth in km
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                  Math.sin(dLon / 2) * Math.sin(dLon / 2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        const d = R * c; // Distance in km
        return d;
    }

    function updateDistanceUI() {
        if (bikePos && userPos) {
            const dist = getDistance(userPos.lat, userPos.lng, bikePos.lat, bikePos.lng);
            if (dist < 1) {
                distanceEl.innerText = Math.round(dist * 1000) + " m";
            } else {
                distanceEl.innerText = dist.toFixed(2) + " km";
            }
        }
    }

    window.toggleDebug = function() {
        const el = document.getElementById("debug-info");
        el.style.display = el.style.display === "none" ? "block" : "none";
    }

    // Track Dashboard User's Location with High Accuracy
    navigator.geolocation.watchPosition((pos) => {
        userPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
        document.getElementById("user-latlng").innerText = userPos.lat.toFixed(4) + "," + userPos.lng.toFixed(4);
        document.getElementById("user-acc").innerText = Math.round(pos.coords.accuracy);
        updateDistanceUI();
    }, (err) => {
        console.log("User Geolocation error:", err);
        document.getElementById("conn-text").innerText += " | GPS Error: " + err.message;
    }, {
        enableHighAccuracy: true,
        maximumAge: 0,
        timeout: 10000
    });

    // Connection monitoring
    onValue(ref(db, ".info/connected"), (snap) => {
        if (snap.val() === true) {
            statusPanel.classList.add("connected");
            connText.innerText = "Connected to Live Database";
        } else {
            statusPanel.classList.remove("connected");
            connText.innerText = "Offline - Reconnecting...";
        }
    });

    onValue(ref(db, "bike"), (snap) => {
        const d = snap.val();
        if (!d || !d.lat) return;

        bikePos = { lat: d.lat, lng: d.lng };
        document.getElementById("bike-latlng").innerText = d.lat.toFixed(4) + "," + d.lng.toFixed(4);
        
        const pos = { lat: d.lat, lng: d.lng };
        marker.setPosition(pos);

        // Filter route jumps (if point is > 2km from last point, ignore for route polyline)
        const currentPath = route.getPath();
        let isOutlier = false;
        if (currentPath.getLength() > 0) {
            const lastLatLng = currentPath.getAt(currentPath.getLength() - 1);
            const dist = getDistance(lastLatLng.lat(), lastLatLng.lng(), d.lat, d.lng);
            if (dist > 2) isOutlier = true; // 2km jump is suspicious
            if (dist < 0.005) isOutlier = true; // Ignore small noise for route
        }

        if (!isOutlier) {
            currentPath.push(new google.maps.LatLng(d.lat, d.lng));
        }

        // Handle Emergency Status
        const banner = document.getElementById("emergency-banner");
        if (d.emergency === true) {
            banner.style.display = "block";
            marker.setIcon({ ...bikeIcon, fillColor: "#ef4444" });
        } else {
            banner.style.display = "none";
            marker.setIcon(bikeIcon);
        }

        if (firstLoad) {
            map.setCenter(pos);
            map.setZoom(16);
            firstLoad = false;
        } else {
            map.panTo(pos);
        }

        speedEl.innerText = Math.round(d.speed || 0) + " km/h";
        timeEl.innerText = "Last update: " + new Date(d.time).toLocaleTimeString();
        
        if (d.address) {
            document.getElementById("address").innerText = d.address;
        }

        updateDistanceUI();
    });

</script>

</body>
</html>
