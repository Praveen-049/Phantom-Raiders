<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bike Dashboard - Live</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: 'Segoe UI', Arial; background: #f0f2f5; }
        #map { height: 100vh; width: 100%; }
        .panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            z-index: 1000;
            width: 220px;
        }
        .header { font-weight: 800; color: #1e293b; margin-bottom: 15px; display: flex; align-items: center; }
        .status-dot { width: 8px; height: 8px; background: #ef4444; border-radius: 50%; margin-right: 8px; }
        .connected .status-dot { background: #10b981; box-shadow: 0 0 8px #10b981; }
        .box { margin-top: 12px; font-size: 14px; color: #475569; }
        .value { font-weight: 700; color: #1e293b; font-size: 1.1rem; }
        #sync-time { font-size: 0.75rem; color: #94a3b8; margin-top: 4px; }
    </style>
</head>
<body>

<div id="status-panel" class="panel">
    <div class="header"><span class="status-dot"></span> BIKE DASHBOARD</div>
    
    <div id="conn-text" style="font-size: 0.7rem; color: #94a3b8; margin-bottom: 10px;">Connecting to Firebase...</div>

    <div class="box">
        Speed: <div id="speed" class="value">0 km/h</div>
    </div>

    <div class="box">
        Points Tracked: <div id="points" class="value">0</div>
    </div>

    <div id="sync-time">Last update: --:--</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCx75fIPlI9Ezn9S6l8vZnsi1qDlP6nuoo",
        authDomain: "phantom-raiders.firebaseapp.com",
        databaseURL: "https://phantom-raiders-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "phantom-raiders",
        storageBucket: "phantom-raiders.firebasestorage.app",
        messagingSenderId: "1055222458613",
        appId: "1:1055222458613:web:75d48960bbb72a3ff7bdbc",
        measurementId: "G-3GX5D8RDMW"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const map = L.map('map').setView([13.0827, 80.2707], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    const marker = L.marker([0, 0]).addTo(map);
    const route = L.polyline([], { color: '#3b82f6', weight: 4 }).addTo(map);

    const statusPanel = document.getElementById("status-panel");
    const connText = document.getElementById("conn-text");
    const speedEl = document.getElementById("speed");
    const pointsEl = document.getElementById("points");
    const timeEl = document.getElementById("sync-time");

    let count = 0;
    let firstLoad = true;

    // Connection monitoring
    onValue(ref(db, ".info/connected"), (snap) => {
        if (snap.val() === true) {
            statusPanel.classList.add("connected");
            connText.innerText = "Connected to Live Database";
        } else {
            statusPanel.classList.remove("connected");
            connText.innerText = "Offline - Reconnecting...";
        }
    });

    onValue(ref(db, "bike"), (snap) => {
        const d = snap.val();
        if (!d || !d.lat) return;

        const pos = [d.lat, d.lng];
        marker.setLatLng(pos);
        route.addLatLng(pos);

        if (firstLoad) {
            map.setView(pos, 16);
            firstLoad = false;
        } else {
            map.panTo(pos);
        }

        speedEl.innerText = Math.round(d.speed || 0) + " km/h";
        timeEl.innerText = "Last update: " + new Date(d.time).toLocaleTimeString();
        
        count++;
        pointsEl.innerText = count;
    });

</script>

</body>
</html>
