<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phantom Raiders | Bike Dashboard</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --primary: #3b82f6;
            --danger: #ef4444;
            --bg: #0b1220;
            --glass: rgba(22, 32, 51, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body { 
            margin: 0; 
            font-family: 'Outfit', sans-serif; 
            background: var(--bg); 
            color: white;
            overflow: hidden;
        }

        #map { 
            height: 100vh; 
            width: 100%; 
            background: #111;
        }

        /* Glass Panel */
        .glass-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 24px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 1000;
            width: 260px;
            transition: all 0.3s ease;
        }

        .header { 
            display: flex; 
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        
        .brand {
            font-weight: 800;
            font-size: 1.1rem;
            letter-spacing: 1px;
            color: white;
        }

        /* Live Indicator */
        .live-tag {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.65rem;
            font-weight: 700;
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
            padding: 4px 10px;
            border-radius: 20px;
            text-transform: uppercase;
        }
        .pulse {
            width: 6px;
            height: 6px;
            background: #10b981;
            border-radius: 50%;
            animation: pulse-ring 1.5s infinite;
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(0.8); opacity: 0.5; }
        }

        /* Stats List */
        .stat-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .stat-item {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .icon-box {
            width: 36px;
            height: 36px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            font-size: 1rem;
        }
        .stat-content {
            flex: 1;
        }
        .label { 
            color: #94a3b8; 
            font-size: 0.7rem; 
            text-transform: uppercase; 
            letter-spacing: 0.5px;
            margin-bottom: 2px;
        }
        .value { 
            font-weight: 600; 
            color: white; 
            font-size: 1.1rem; 
        }

        #address { 
            color: var(--primary); 
            font-size: 0.85rem; 
            line-height: 1.4;
        }

        #sync-time { 
            font-size: 0.7rem; 
            color: #64748b; 
            margin-top: 15px;
            text-align: right;
        }

        /* Emergency Banner */
        #emergency-banner {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: var(--danger);
            color: white;
            text-align: center;
            padding: 12px;
            font-weight: 800;
            font-size: 1rem;
            z-index: 2000;
            display: none;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4);
            animation: slideDown 0.5s ease-out, emergency-blink 0.8s infinite;
        }
        @keyframes slideDown {
            from { transform: translateY(-100%); }
            to { transform: translateY(0); }
        }
        @keyframes emergency-blink {
            0% { background: #ef4444; }
            50% { background: #991b1b; }
            100% { background: #ef4444; }
        }

        /* Leaflet Overrides */
        .leaflet-container { background: #000 !important; }
        .leaflet-bar { border: none !important; box-shadow: 0 4px 15px rgba(0,0,0,0.3) !important; }
        .leaflet-bar a { 
            background: var(--glass) !important; 
            color: white !important; 
            border-bottom: 1px solid var(--glass-border) !important; 
            backdrop-filter: blur(5px) !important;
        }
        
        #debug-info {
            font-size: 0.6rem;
            color: #64748b;
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px solid var(--glass-border);
            display: none;
        }
    </style>
</head>
<body>

<div id="emergency-banner">
    <i class="fas fa-triangle-exclamation"></i> CRASH DETECTED • EMERGENCY ALERT ACTIVE
    <a href="tel:112" style="margin-left: 15px;"><button style="background:white; color:var(--danger); border:none; padding:4px 12px; border-radius:6px; font-weight:700; cursor:pointer;">CALL SOS</button></a>
</div>

<div id="theft-banner" style="position:fixed; top:0; left:0; width:100%; background:#f97316; color:white; text-align:center; padding:12px; font-weight:800; font-size:1rem; z-index:2001; display:none; box-shadow:0 4px 15px rgba(249, 115, 22, 0.4); animation: slideDown 0.5s ease-out, theft-blink 0.8s infinite;">
    <i class="fas fa-hand-fist"></i> THEFT ALERT: BIKE IS MOVING!
    <a href="tel:112" style="margin-left: 15px;"><button style="background:white; color:#c2410c; border:none; padding:4px 12px; border-radius:6px; font-weight:700; cursor:pointer;">CALL SOS</button></a>
    <button onclick="silenceAlarm()" style="background:rgba(255,255,255,0.2); color:white; border:1px solid white; padding:4px 12px; border-radius:6px; margin-left:10px; font-weight:700; cursor:pointer;">DISMISS</button>
</div>

<div id="audio-prompt" style="position:fixed; bottom:20px; right:20px; background:var(--glass); backdrop-filter:blur(10px); padding:15px; border-radius:15px; border:1px solid var(--glass-border); z-index:3000; color:white; display:flex; align-items:center; gap:10px; box-shadow:0 10px 30px rgba(0,0,0,0.5);">
    <i class="fas fa-volume-high"></i>
    <span style="font-size:0.8rem;">Enable Audio Alerts?</span>
    <button onclick="enableAudio()" style="background:var(--primary); color:white; border:none; padding:5px 12px; border-radius:8px; font-weight:600; cursor:pointer;">YES</button>
</div>

<style>
    @keyframes theft-blink {
        0% { background: #f97316; }
        50% { background: #ea580c; }
        100% { background: #f97316; }
    }
</style>

<div class="glass-panel">
    <div class="header">
        <div class="brand">PHANTOM</div>
        <div class="live-tag">
            <div class="pulse"></div> LIVE
        </div>
    </div>

    <div class="stat-grid">
        <!-- Status Info -->
        <div class="stat-item" style="border-bottom:1px solid var(--glass-border); padding-bottom:15px; margin-bottom:10px;">
            <div id="status-pulse" class="live-pulse"></div>
            <div class="stat-content">
                <div class="label" id="rider-label">System Active</div>
                <div id="ride-status" class="value" style="color:var(--success);">LIVE TRACKING</div>
            </div>
        </div>

        <div class="stat-grid">
            <div class="stat-item">
                <div class="icon-box"><i class="fas fa-gauge-high"></i></div>
                <div class="stat-content">
                    <div class="label">Speed</div>
                    <div id="speed" class="value">0 <span style="font-size:0.7rem; font-weight:400;">km/h</span></div>
                </div>
            </div>
            
            <div class="stat-item">
                <div class="icon-box"><i class="fas fa-arrows-up-down-left-right"></i></div>
                <div class="stat-content">
                    <div class="label">Distance</div>
                    <div id="dist-ui" class="value">---</div>
                </div>
            </div>
        </div>

        <!-- Location -->
        <div class="stat-item">
            <div class="icon-box"><i class="fas fa-location-dot"></i></div>
            <div class="stat-content">
                <div class="label">Last Known Address</div>
                <div id="address" class="value">---</div>
            </div>
        </div>

        <!-- Remote Ride Control -->
        <div class="stat-item" style="border-top:1px solid var(--glass-border); padding-top:15px; margin-top:5px; flex-direction:column; gap:10px;">
            <button class="btn" style="background:var(--success); color:white; border:none; padding:10px; border-radius:10px; font-weight:700; width:100%; cursor:pointer;" onclick="remoteCommand('START')">
                <i class="fas fa-play"></i> REMOTE START RIDE
            </button>
            <button class="btn" style="background:rgba(239, 68, 68, 0.1); color:#ef4444; border:1px solid #ef4444; padding:8px; border-radius:10px; font-weight:700; width:100%; cursor:pointer;" onclick="remoteCommand('STOP')">
                <i class="fas fa-stop"></i> REMOTE STOP
            </button>
        </div>

        <!-- Anti-theft Toggle -->
        <div class="stat-item" style="border-top:1px solid var(--glass-border); padding-top:10px; margin-top:5px;">
            <div class="icon-box" id="lock-icon-box"><i class="fas fa-lock-open"></i></div>
            <div class="stat-content">
                <div class="label">Anti-Theft Lock</div>
                <button id="lock-btn" style="background:var(--primary); border:none; color:white; padding:6px 15px; border-radius:8px; font-family:inherit; font-weight:600; cursor:pointer; width:100%;">LOCK BIKE</button>
            </div>
        </div>
    </div>

    <div id="sync-time">Last update: Waiting...</div>

    <div id="debug-info">
        <div>Bike: <span id="bike-latlng">---</span></div>
        <div>You: <span id="user-latlng">---</span> (±<span id="user-acc">0</span>m)</div>
    </div>
    <button onclick="toggleDebug()" style="background:none; border:none; color:#475569; font-size:0.5rem; cursor:pointer; margin-top:10px; width:100%; text-align:right;">[DEBUG VIEW]</button>
</div>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCx75fIPlI9Ezn9S6l8vZnsi1qDlP6nuoo",
        authDomain: "phantom-raiders.firebaseapp.com",
        databaseURL: "https://phantom-raiders-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "phantom-raiders",
        storageBucket: "phantom-raiders.firebasestorage.app",
        messagingSenderId: "1055222458613",
        appId: "1:1055222458613:web:75d48960bbb72a3ff7bdbc",
        measurementId: "G-3GX5D8RDMW"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Initial Map Setup
    const map = L.map('map', { zoomControl: false }).setView([13.0827, 80.2707], 13);
    L.control.zoom({ position: 'bottomright' }).addTo(map);

    // Dark Map Style (CartoDB Dark Matter)
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '© OpenStreetMap © CARTO'
    }).addTo(map);

    // Custom BIKE Icon (SVG Path)
    const bikeIcon = L.divIcon({
        className: 'custom-bike-icon',
        html: `<div style="filter: drop-shadow(0 0 8px rgba(59, 130, 246, 0.5))">
                <svg viewBox="0 0 512 512" width="40" height="40">
                    <path class="bike-path" fill="#3b82f6" d="M416 96c26.5 0 48-21.5 48-48S442.5 0 416 0s-48 21.5-48 48 21.5 48 48 48zm-80 64c-17.7 0-32 14.3-32 32v128c0 17.7 14.3 32 32 32s32-14.3 32-32V192c0-17.7-14.3-32-32-32zm-128 0c-17.7 0-32 14.3-32 32v128c0 17.7 14.3 32 32 32s32-14.3 32-32V192c0-17.7-14.3-32-32-32zM96 96c26.5 0 48-21.5 48-48S122.5 0 96 0 48 21.5 48 48s21.5 48 48 48zm400 352H16c-8.8 0-16 7.2-16 16s7.2 16 16 16h480c8.8 0 16-7.2 16-16s-7.2-16-16-16zm-336-64V128c0-17.7-14.3-32-32-32s-32 14.3-32 32v256c0 17.7 14.3 32 32 32s32-14.3 32-32zm256 0V128c0-17.7-14.3-32-32-32s-32 14.3-32 32v256c0 17.7 14.3 32 32 32s32-14.3 32-32z"/>
                    <path class="bike-path" fill="#3b82f6" d="M376.1 144H135.9c-13.3 0-25.5 8.1-30.8 20.2l-64 144C34.6 323.2 41.5 336 53.3 336H458.7c11.8 0 18.7-12.8 12.3-27.8l-64-144c-5.3-12.1-17.5-20.2-30.9-20.2z"/>
                </svg>
               </div>`,
        iconSize: [40, 40],
        iconAnchor: [20, 20]
    });

    const marker = L.marker([0, 0], { icon: bikeIcon }).addTo(map);
    const route = L.polyline([], { color: '#3b82f6', weight: 4, opacity: 0.6 }).addTo(map);

    const speedEl = document.getElementById("speed");
    const distanceEl = document.getElementById("dist-ui"); // Changed ID
    const timeEl = document.getElementById("sync-time");

    let firstLoad = true;
    let bikePos = null;
    let userPos = null;
    let userAccuracy = 9999;

    function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371; 
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                  Math.sin(dLon / 2) * Math.sin(dLon / 2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        return R * c;
    }

    function updateDistanceUI() {
        if (bikePos && userPos) {
            if (userAccuracy > 500) {
                document.getElementById("dist-ui").closest(".stat-item").style.display = "none"; // Adjusted to new structure
                return;
            }
            document.getElementById("dist-ui").closest(".stat-item").style.display = "flex"; // Adjusted to new structure

            const dist = getDistance(userPos.lat, userPos.lng, bikePos.lat, bikePos.lng);
            distanceEl.innerText = dist < 1 ? Math.round(dist * 1000) + " m" : dist.toFixed(2) + " km";
        }
    }

    window.toggleDebug = function() {
        const el = document.getElementById("debug-info");
        el.style.display = el.style.display === "none" ? "block" : "none";
    }

    // High Accuracy Tracking
    navigator.geolocation.watchPosition((pos) => {
        userPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
        userAccuracy = pos.coords.accuracy;
        document.getElementById("user-latlng").innerText = userPos.lat.toFixed(4) + "," + userPos.lng.toFixed(4);
        document.getElementById("user-acc").innerText = Math.round(pos.coords.accuracy);
        updateDistanceUI();
    }, null, { enableHighAccuracy: true });

    // Anti-theft Controls
    const lockBtn = document.getElementById("lock-btn");
    const lockIconBox = document.getElementById("lock-icon-box");
    let isLocked = false;

    lockBtn.onclick = () => {
        const nextState = !isLocked;
        set(ref(db, "bike/locked"), nextState);
        if (!nextState) set(ref(db, "bike/theft"), false); // Reset theft if unlocking
    };

    window.silenceAlarm = () => {
        set(ref(db, "bike/theft"), false);
    };

    // Audio Siren for Dashboard
    let audioCtx = null;
    let alarmInterval = null;

    window.enableAudio = () => {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        document.getElementById("audio-prompt").style.display = "none";
    };

    function startSiren() {
        if (alarmInterval || !audioCtx) return;
        alarmInterval = setInterval(() => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.4);
            gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.4);
        }, 500);
    }

    function stopSiren() {
        if (alarmInterval) {
            clearInterval(alarmInterval);
            alarmInterval = null;
        }
    }

    // --- Remote Commands ---
    window.remoteCommand = (cmd) => {
        set(ref(db, "bike/remote_command"), cmd);
        updateTimeline(`Sent Remote ${cmd} command`);
    };

    onValue(ref(db, "bike/locked"), (snap) => {
        isLocked = snap.val() === true;
        if (isLocked) {
            lockBtn.innerText = "UNLOCK BIKE";
            lockBtn.style.background = "#64748b";
            lockIconBox.innerHTML = '<i class="fas fa-lock"></i>';
            lockIconBox.style.color = "#3b82f6";
        } else {
            lockBtn.innerText = "LOCK BIKE";
            lockBtn.style.background = "#3b82f6";
            lockIconBox.innerHTML = '<i class="fas fa-lock-open"></i>';
            lockIconBox.style.color = "#94a3b8";
        }
    });

    onValue(ref(db, "bike/theft"), (snap) => {
        const theftBanner = document.getElementById("theft-banner");
        if (snap.val() === true) {
            theftBanner.style.display = "block";
            startSiren();
        } else {
            theftBanner.style.display = "none";
            stopSiren();
        }
    });

    onValue(ref(db, "bike/emergency"), (snap) => {
        const emergencyBanner = document.getElementById("emergency-banner");
        if (snap.val() === true) {
            emergencyBanner.style.display = "block";
            startSiren();
            // Turn bike marker red
            const paths = document.querySelectorAll('.bike-path');
            paths.forEach(p => p.setAttribute('fill', '#ef4444'));
        } else {
            emergencyBanner.style.display = "none";
            stopSiren();
            const paths = document.querySelectorAll('.bike-path');
            paths.forEach(p => p.setAttribute('fill', '#3b82f6'));
        }
    });

    onValue(ref(db, "bike"), (snap) => {
        const d = snap.val();
        if (!d || !d.lat) return;

        // Update Rider & Status
        const riderLabel = document.getElementById("rider-label");
        const rideStatus = document.getElementById("ride-status");
        const pulse = document.getElementById("status-pulse");

        if (d.rider) riderLabel.innerText = "Rider: " + d.rider;

        if (d.isParked) {
            rideStatus.innerText = "PARKED 🅿️";
            rideStatus.style.color = "var(--warning)";
            pulse.style.background = "var(--warning)";
            pulse.style.animation = "none";
        } else if (d.isRiding) {
            rideStatus.innerText = "LIVE TRACKING";
            rideStatus.style.color = "var(--success)";
            pulse.style.background = "var(--success)";
            pulse.style.animation = "pulse 2s infinite";
        } else {
            rideStatus.innerText = "IDLE";
            rideStatus.style.color = "#94a3b8";
            pulse.style.background = "#94a3b8";
            pulse.style.animation = "none";
        }

        bikePos = { lat: d.lat, lng: d.lng };
        document.getElementById("bike-latlng").innerText = d.lat.toFixed(4) + "," + d.lng.toFixed(4);
        const pos = [d.lat, d.lng];
        marker.setLatLng(pos);

        // Filter route jumps
        const lastLatLng = route.getLatLngs().length > 0 ? route.getLatLngs()[route.getLatLngs().length - 1] : null;
        let isOutlier = false;
        if (lastLatLng) {
            const dist = getDistance(lastLatLng.lat, lastLatLng.lng, d.lat, d.lng);
            if (dist > 2) isOutlier = true;
            if (dist < 0.005) isOutlier = true;
        }

        if (!isOutlier) route.addLatLng(pos);

        // Emergency Handling
        const banner = document.getElementById("emergency-banner");
        const paths = document.querySelectorAll('.bike-path');
        if (d.emergency === true) {
            banner.style.display = "block";
            paths.forEach(p => p.setAttribute('fill', '#ef4444'));
        } else {
            banner.style.display = "none";
            paths.forEach(p => p.setAttribute('fill', '#3b82f6'));
        }

        if (firstLoad) {
            map.setView(pos, 16);
            firstLoad = false;
        } else {
            map.panTo(pos);
        }

        speedEl.innerText = Math.round(d.speed || 0) + " km/h";
        timeEl.innerText = "Last update: " + new Date(d.time).toLocaleTimeString();
        if (d.address) document.getElementById("address").innerText = d.address;
        updateDistanceUI();
    });

</script>
</body>
</html>

</body>
</html>
